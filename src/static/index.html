<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="user-menu" id="user-menu">
        <button id="user-menu-toggle" class="icon-button" aria-label="User menu">User</button>
        <div id="user-menu-panel" class="user-menu-panel hidden">
          <button id="login-button" type="button">Teacher Login</button>
          <button id="logout-button" type="button" class="hidden">Logout</button>
        </div>
      </div>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activity-intro">
        <h3>Activity Board</h3>
        <p id="auth-hint" class="info-note">Teacher login is required to register or unregister students.</p>
        <div id="message" class="hidden"></div>
      </section>

      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list" class="activity-grid">
          <p>Loading activities...</p>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <div id="login-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="login-modal-title">
      <div class="modal-content">
        <h3 id="login-modal-title">Teacher Login</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" required />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" required />
          </div>
          <div class="modal-actions">
            <button type="button" id="cancel-login">Cancel</button>
            <button type="submit">Login</button>
          </div>
        </form>
      </div>
    </div>

    <div id="register-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="register-modal-title">
      <div class="modal-content">
        <h3 id="register-modal-title">Register Student</h3>
        <form id="register-form">
          <p class="modal-activity">Activity: <strong id="register-activity-name"></strong></p>
          <div class="form-group">
            <label for="register-email">Student Email:</label>
            <input type="email" id="register-email" required placeholder="student@mergington.edu" />
          </div>
          <div class="modal-actions">
            <button type="button" id="cancel-register">Cancel</button>
            <button type="submit">Register Student</button>
          </div>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
